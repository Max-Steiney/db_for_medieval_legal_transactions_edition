name: Frontend tests + smoke build + verification

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  frontend:
    name: Frontend tests + smoke build + verification
    runs-on: ubuntu-latest
    steps:
      # 1. Check out THIS repo at $GITHUB_WORKSPACE/db_for_medieval_legal_transactions_edition
      - uses: actions/checkout@v4
        with:
          path: db_for_medieval_legal_transactions_edition

      # 2. Check out the sibling data repo (canonical source of truth) next to
      #    it (same parent dir) so frontend/__init__.py finds it via
      #    Path(...).parent.parent.parent. The data repo is private, so we
      #    authenticate with a classic PAT (scope `repo`, owned by a KGruenwald
      #    collaborator) stored as the repo secret DATA_REPO_TOKEN.
      - uses: actions/checkout@v4
        with:
          repository: KGruenwald/db_for_medieval_legal_transactions
          token: ${{ secrets.DATA_REPO_TOKEN }}
          path: db_for_medieval_legal_transactions

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: db_for_medieval_legal_transactions_edition/frontend/package.json

      - name: Install dependencies
        run: |
          pip install -r db_for_medieval_legal_transactions/requirements.txt
          pip install -r db_for_medieval_legal_transactions_edition/frontend/requirements.txt
          pip install pytest

      - name: Install JS test dependencies
        working-directory: db_for_medieval_legal_transactions_edition/frontend
        run: npm install --no-audit --no-fund

      - name: Generate pipeline CSVs (frontend reads them)
        working-directory: db_for_medieval_legal_transactions
        run: python -m pipeline transform

      # Smoke-Build muss vor den Tests laufen, weil test_data_schema.py
      # gegen den realen Build-Output unter docs/data/ prueft.
      - name: Smoke build
        working-directory: db_for_medieval_legal_transactions_edition
        run: python -m frontend build

      # Interner Build fuer den Drift-Monitor: verification.run vergleicht den
      # released-Scope gegen die INTERNE Fassung unter docs-intern/. Ohne diesen
      # Build bricht die Verifikation mit "Ziel-Build fehlt" (exit 2) ab.
      # Schreibt nach docs-intern/ und laesst den oeffentlichen docs/-Build fuer
      # die pytest-Schemapruefung unberuehrt.
      - name: Smoke build (intern, fuer Drift-Monitor)
        working-directory: db_for_medieval_legal_transactions_edition
        run: python -m frontend build --audience intern

      - name: Run frontend tests
        working-directory: db_for_medieval_legal_transactions_edition
        run: python -m pytest frontend/tests/ -v --tb=short

      - name: Run JS logic tests (Vitest)
        working-directory: db_for_medieval_legal_transactions_edition/frontend
        run: npm test

      # Verifikations-Test-Set: blockierender Drift-Monitor.
      # Liest TEI-Quellen und Register unabhaengig von Pipeline und Aggregator
      # ein, vergleicht mit docs/data/-JSONs. Aktuell sind alle bekannten
      # Differenzen als known_gap dokumentiert; ein neu auftretendes
      # mismatch ist daher ein echter Drift und schaltet CI rot.
      - name: Verification (drift monitor)
        id: verify
        working-directory: db_for_medieval_legal_transactions_edition
        run: python -m verification.run

      # Verifikations-Reports immer hochladen, auch wenn der Lauf
      # mismatches gemeldet hat - so sind sie als CI-Artifact nachlesbar.
      - name: Upload verification reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: verification-reports
          path: db_for_medieval_legal_transactions_edition/verification/reports/
          if-no-files-found: ignore
